<div class="controls-panel">
  <h3>Run AI Trade Cycle</h3>
  <div class="input-group">
    <label>Target Asset:</label>
    <input [(ngModel)]="assetToTrade" type="text" placeholder="e.g. BTC, ETH">
  </div>
  
  <button (click)="triggerCycle()" [disabled]="isProcessing">
    {{ isProcessing ? 'Agents are analyzing...' : 'Trigger Multi-Agent Cycle' }}
  </button>

  <div *ngIf="lastResult" class="result" [class.success]="lastResult.trade_executed">
    <p><strong>Cycle Complete!</strong></p>
    <p *ngIf="lastResult.trade_executed">
      Action taken: {{ lastResult.proposed_trade?.action }} {{ lastResult.proposed_trade?.amount }} {{ lastResult.proposed_trade?.asset }}
    </p>
    <p *ngIf="!lastResult.trade_executed && lastResult.status === 'success'">
      Action taken: Agents decided to HOLD / Reject Trade.
    </p>
  </div>
</div>
