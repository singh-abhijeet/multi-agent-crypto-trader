<div class="dashboard">
  <h2>Portfolio Dashboard</h2>
  <div *ngIf="portfolio" class="card">
    <h3>Cash Balance: ${{ portfolio.cash | number:'1.2-2' }}</h3>
    <h4>Holdings</h4>
    <ul>
      <li *ngFor="let asset of portfolio.holdings | keyvalue">
        {{ asset.key }}: {{ asset.value }}
      </li>
    </ul>
  </div>

  <h3>Recent Trades</h3>
  <table class="trades-table" *ngIf="trades.length > 0">
    <thead>
      <tr>
        <th>Time</th>
        <th>Asset</th>
        <th>Action</th>
        <th>Amount</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let t of trades">
        <td>{{ t.timestamp | date:'short' }}</td>
        <td>{{ t.asset }}</td>
        <td [class]="t.action === 'BUY' ? 'buy' : 'sell'">{{ t.action }}</td>
        <td>{{ t.amount }}</td>
        <td>${{ t.price }}</td>
      </tr>
    </tbody>
  </table>
</div>
